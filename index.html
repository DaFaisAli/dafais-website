<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faisal Ali | Model Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="DaLogo.png">
</head>
<body class="home-page">
    <!-- Fullscreen Collage Background -->
    <div class="collage-bg" id="collageBg"></div>
    
    <!-- Dark overlay for text readability -->
    <div class="collage-overlay"></div>
    
    <!-- Centered Hero Content -->
    <div class="home-hero">
        <h1 class="name"><a href="index.html">Faisal Ali</a></h1>
        <p class="home-tagline">Model | Creative | Storyteller</p>
        
        <nav class="home-nav">
            <a href="gallery.html">Gallery</a>
            <a href="zcard.html">Z-Card</a>
            <a href="contact.html">Contact</a>
        </nav>
        
        <div class="scroll-hint">
            <div class="scroll-arrow">↑</div>
            <span>Enter</span>
        </div>
    </div>

    <script src="script.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const collageBg = document.getElementById('collageBg');
        const photoCount = 46;
        
        // Use .JPG since that worked for your gallery
        for (let i = 1; i <= photoCount; i++) {
            const collageItem = document.createElement('div');
            collageItem.className = 'collage-item';
            collageItem.style.opacity = '0.85';
            
            // Random position and size
            const randomX = Math.random() * 100;
            const randomY = Math.random() * 100;
            const randomSize = 150 + Math.random() * 200;
            const randomRotation = -10 + Math.random() * 20;
            
            collageItem.style.cssText = `
                left: ${randomX}%;
                top: ${randomY}%;
                width: ${randomSize}px;
                transform: rotate(${randomRotation}deg);
                position: absolute;
                opacity: 0.85;
            `;
            
            const img = document.createElement('img');
            img.src = `photos/${i}.jpg`;
            img.alt = 'Faisal Ali';
            img.style.width = '100%';
            img.style.height = '100%';
            img.style.objectFit = 'cover';
            
            collageItem.appendChild(img);
            collageBg.appendChild(collageItem);
        }
        
        // Add floating animation
        const items = document.querySelectorAll('.collage-item');
        items.forEach((item, index) => {
            const duration = 15 + Math.random() * 15;
            item.style.animation = `float ${duration}s infinite ease-in-out`;
            item.style.animationDelay = `${index * 0.1}s`;
        });
    });
</script>
</body>
</html>
